_base_: local.yaml

evaluator:
  raw_num_classes: 6
  num_classes: 5
  label_scheme: "cat4plus"
  class_weight_alpha: 0.7
  label_smoothing: 0.04
  early_stopping_patience: 6

  sampler:
    mode: "natural"
    strength: 0.35

  model:
    image_size: 256
    input_shape: [256, 256, 1]
    stage_channels: [32, 64, 128, 256]
    blocks_per_stage: 2
    embedding_dim: 256
    norm: "group"
    gn_groups: 8
    spatial_dropout_rate: 0.05
    embedding_dropout_rate: 0.25

  class_weights:
    alpha: 0.7

  loss:
    lambda_cls: 1.0
    lambda_wind: 1.0
    huber_delta: 1.0
    label_smoothing: 0.04

  training:
    seed: 42
    num_epochs: 27
    batch_size: 16
    lr: 3.0e-4
    weight_decay: 5.0e-4
    log_interval_steps: 20
    mixed_precision: true
    jit_compile: true
    grad_clip_norm: 1.0
    drop_remainder: false
    save_last_weights: true
    max_train_batches: null

  validation:
    max_batches: null
    show_progress: false

  reduce_lr_on_plateau:
    enabled: true
    factor: 0.5
    patience_epochs: 5
    min_delta: 1.0e-4
    min_lr: 1.0e-6
    cooldown_epochs: 0

  checkpoint:
    monitor: "selection.tail_score"
    mode: "min"
    min_delta: 1.0e-6
    max_to_keep: 1

  early_stopping:
    enabled: true
    patience_epochs: 6

  metrics:
    tail_classes: [4]
