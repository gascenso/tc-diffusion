data:
  data_root: "data/gridsat_patches"
  dataset_index: "data/dataset_index_wind.json"
  backend: "packed_memmap"           # "netcdf" | "packed_memmap"
  packed_manifest: "data/packed_tc_memmap/manifest.json"       # required when backend: packed_memmap
  netcdf_engine: "netcdf4"
  class_balance_alpha: 0.4
  class_balance_curriculum:
    enabled: true
    start_alpha: 1.0
    end_alpha: 0.4
    start_epoch: 0
    ramp_epochs: 40
    mode: "cosine"
  batch_size: 8
  image_size: 256
  bt_min_k: 180.0 # q0.1; global min is 117.0
  bt_max_k: 310.0 # q99.9; global max is 348.0
  split_dir: data/splits
  eval_num_parallel_calls: null  # null -> 1 for netcdf, AUTOTUNE for packed_memmap
  eval_seed: 42
  eval_mode: full
  val_balanced_per_class: 5 # used only when eval_mode: balanced_fixed

conditioning:
  num_ss_classes: 6           # 0-5 Saffir-Simpson categories
  use_wind_speed: true        # requires dataset_index.json with "samples" metadata for best results
  wind_min_kt: 35.0
  wind_max_kt: 170.0
  wind_null_kt: 0.0
  eval_wind_targets_kt:       # used by evaluator when use_wind_speed=true
    "0": 49.0
    "1": 73.0
    "2": 89.0
    "3": 104.0
    "4": 124.5
    "5": 145.0
  use_basin: false            # placeholder
  cfg_drop_prob: 0.1
  
model:
  base_channels: 32
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  attention_resolutions: [32]   # keep [] for baseline; try [32] first for low-res attention
  attention_heads: 4
  dropout: 0.0

diffusion:
  num_steps: 1000
  beta_schedule: "linear"
  # Training target / parameterization:
  # - "eps_mse" (default): predict epsilon (classic DDPM)
  # - "v_mse":             predict v (recommended modern default)
  loss_type: "v_mse"
  # Optional Min-SNR-gamma weighting (set null to disable).
  # Typical values: 3.0 - 5.0. Works with both eps and v.
  min_snr_gamma: 2.5
  dynamic_threshold: true
  dynamic_threshold_p: 0.995

training:
  num_epochs: 100
  steps_per_epoch: 2000
  lr: 1e-4
  ema_decay: 0.9999
  log_interval_steps: 10
  mixed_precision: false
  val_every_epochs: 1
  early_stopping:
    enabled: true
    patience_epochs: 15   # number of epochs with no improvement before stopping
    min_delta: 1.0e-8     # minimum improvement in loss to count as "better"

evaluation:
  n_per_class_heavy: 35
  gen_batch_size: null       # micro-batch for generation; null -> use data.batch_size

  # generation settings
  guidance_scale: 2.5         # set >0 once you rely on CFG at inference
  sampler: "ddpm"             # "ddpm" supported; can extend later
  seed: 123

  # real reference sampling (matched by class)
  real_seed: 123

  # feature + diversity
  profile_bins: 96            # radial bins for profiles (higher -> more detailed, slower)
  psd_bins: 96                # radial bins for power spectrum

  proxy_classifier:
    enabled: true
    max_train_per_class: 2000
    C: 1.0
    solver: "lbfgs"
    max_iter: 200
