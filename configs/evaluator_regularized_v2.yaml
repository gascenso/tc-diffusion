_base_: evaluator_local.yaml

evaluator:
  class_weight_alpha: 0.7
  label_smoothing: 0.04
  early_stopping_patience: 6

  model:
    spatial_dropout_rate: 0.05
    embedding_dropout_rate: 0.25

  class_weights:
    alpha: 0.7

  loss:
    label_smoothing: 0.04

  training:
    num_epochs: 50
    weight_decay: 5.0e-4

  early_stopping:
    enabled: true
    patience_epochs: 6
