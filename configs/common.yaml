data:
  data_root: "../data/gridsat_patches"
  dataset_index: "../data/dataset_index_wind.json"
  backend: "packed_memmap"           # local/HPC can override if needed
  packed_manifest: "../data/packed_tc_memmap/manifest.json"
  netcdf_engine: "netcdf4"
  class_balance_alpha: 0.4
  class_balance_curriculum:
    enabled: true
    start_alpha: 1.0
    end_alpha: 0.45
    start_epoch: 0
    ramp_epochs: 70
    mode: "cosine"
  batch_size: 16
  train_pipeline_profile: local_5090  # legacy | local_5090 | cassandra_hpc
  train_prefetch_batches: 1  # local_5090 only; 0 disables lookahead
  hpc_loader:                # cassandra_hpc only
    prefetch_batches: 2
    sort_within_shard: true
    max_samples_per_read: null
    warmup_shards: false
  image_size: 256
  bt_min_k: 170.0 # q0.05; global min is 117.0
  bt_max_k: 325.0 # q99.95; global max is 348.0
  split_dir: ../data/splits
  eval_num_parallel_calls: null  # null -> 1 for netcdf, AUTOTUNE for packed_memmap
  eval_seed: 42             # legacy; train/val dataset seeding now follows training.seed
  eval_mode: full
  val_balanced_per_class: 7

conditioning:
  num_ss_classes: 6
  use_wind_speed: true
  wind_min_kt: 35.0
  wind_max_kt: 170.0
  wind_null_kt: 0.0
  eval_wind_targets_kt:
    "0": 49.0
    "1": 73.0
    "2": 89.0
    "3": 104.0
    "4": 124.5
    "5": 145.0
  cfg_drop_prob: 0.1

model:
  base_channels: 32
  channel_mults: [1, 1, 2, 4, 8, 8]
  num_res_blocks: 3
  decoder_skip_mode: "per_resblock"  # "per_resblock" (modern) | "per_level" (legacy)
  output_head_pre_norm: true
  attention_resolutions: [8, 16, 32]
  attention_heads: 4

diffusion:
  num_steps: 1000
  beta_schedule: "cosine"
  rescale_zero_terminal_snr: false
  loss_type: "v_mse"
  min_snr_gamma: 2.5
  dynamic_threshold: true
  dynamic_threshold_p: 0.995

physics_loss:
  enabled: false
  lambda_phys: 0.05
  radial_weight: 1.0
  dav_weight: 0.0
  dav_radius_km: 300.0
  pixel_size_km: 8.0
  hist_weight: 0.0
  hist_bins: 32
  hist_softness_k: 2.5
  cold_weight: 0.5
  grad_weight: 0.25  # legacy optional texture proxy; prefer dav_weight when possible
  snr_gate_max: 0.8
  radial_bins: 64
  cold_threshold_k: 235.0
  cold_softness_k: 5.0
  charbonnier_eps: 1.0e-3

training:
  seed: 42              # authoritative seed for data order, RNG streams, and resumable training
  num_epochs: 140
  steps_per_epoch: 2000
  lr: 1e-4
  lr_min: 1.0e-6        # cosine decay floor
  warmup_steps: 500     # linear warmup from 0 → lr over this many optimizer steps
  ema_decay: 0.9999
  log_interval_steps: 10
  mixed_precision: true
  # Compile the train step with XLA (jit_compile=True). Gives an additional
  # ~1.5-2x speedup on H100/RTX 50xx beyond plain @tf.function, but adds a
  # long one-time compilation on the first batch. Test with a smoke run first.
  jit_compile: true
  grad_clip_norm: 1.0   # global gradient norm clipping (0 or null to disable)
  val_every_epochs: 1
  # Resume uses the TensorFlow checkpoint under runs/<name>/train_checkpoints/,
  # so exporting extra H5 "last" snapshots every epoch is optional. Disabling
  # them avoids a large epoch-end serialization cost on both local and HPC runs.
  save_last_weights: false
  save_ema_last_weights: false
  input_pipeline_profile:
    enabled: true
    window_steps: 50
  early_stopping:
    enabled: true
    monitor: "ema"         # "ema" (recommended when EMA is used) or "raw"
    patience_epochs: 25
    min_delta: 1.0e-7

evaluation:
  n_per_class_light: 5
  n_per_class_heavy: 100
  n_plot_per_group: 25   # plot up to 25 real + 25 generated samples per class
  epoch_preview:
    enabled: true
    every_epochs: 20
    n_per_class: 10
    ncols: 5
    use_ema: true
    seed: 123
  gen_batch_size: 128
  guidance_scale: 0.5
  sampler: "dpmpp_2m"    # "ddpm" | "ddim" | "dpmpp_2m"
  sampling_steps: 100     # used by DDIM / DPM++ 2M; DDPM ignores it
  timestep_schedule: "trailing"  # "linear" | "leading" | "trailing"
  ddim_steps: null       # legacy alias for sampling_steps
  ddim_eta: 0.0          # 0.0 -> deterministic DDIM
  seed: 123
  real_seed: 123
  profile_bins: 96
  psd_bins: 96
  dav_radius_km: 300.0
  dav_pixel_size_km: 8.0
  dav_center_region_size: 3
  bootstrap_reps: 500
  bootstrap_reps_full_test: 0  # full-test eval uses all real test samples/class; disable expensive CI bootstrap by default
  bootstrap_ci_level: 0.95
